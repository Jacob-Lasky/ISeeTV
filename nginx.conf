worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    sendfile on;
    client_max_body_size 0;
    
    # Add HLS specific mime types
    types {
        application/vnd.apple.mpegurl m3u8;
        video/mp2t ts;
    }

    server {
        listen 80;

        # Serve the frontend
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri /index.html;
        }

        # Proxy API requests to the backend
        location /api/ {
            proxy_pass http://127.0.0.1:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            
            # Add timeout configurations
            proxy_connect_timeout 10s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
        }

        # Updated segments handling
        location /api/segments/ {
            alias /tmp/iseetv_segments/;
            
            # CORS headers
            add_header Access-Control-Allow-Origin *;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Methods 'GET, OPTIONS';
            add_header Access-Control-Allow-Headers 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type';
            
            # HLS specific settings
            expires -1;
            add_header X-Frame-Options "SAMEORIGIN";
            
            # Error handling for missing segments
            error_page 404 = @segment_error;
            
            # Increase timeout for segment requests
            proxy_read_timeout 10s;
            
            # Try multiple times for segments
            try_files $uri $uri/ =404;
        }

        # Error handler for missing segments
        location @segment_error {
            return 503;  # Return service unavailable instead of 404
        }

        # Specific handling for m3u8 files
        location ~ \.m3u8$ {
            add_header Cache-Control no-cache;
            expires -1;
            add_header Access-Control-Allow-Origin *;
        }
    }
}